services:
  - type: web
    name: road-insight-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: starter
    envVars:
      - key: YOLO_MODEL_PATH
        value: models/best.pt
      - key: MODEL_VERSION
        value: road-insight-yolo11n-pothole-v1
      - key: DETECTION_CONF
        value: "0.6"
      - key: IOU_THRESHOLD
        value: "0.5"
      - key: MAX_DETECTIONS
        value: "20"
      - key: MAX_UPLOAD_BYTES
        value: "10485760"
      - key: ALLOWED_ORIGINS
        value: http://localhost:3000,https://your-frontend-domain.vercel.app
